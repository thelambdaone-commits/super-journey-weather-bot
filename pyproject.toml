[tool.ruff]
target-version = "py311"
line-length = 120
extend-exclude = [
    "data",
    "data_test",
    "scratch",
    "logs",
    "venv",
]

[tool.ruff.lint]
select = ["E9", "F63", "F7", "F82"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"

[tool.pytest.ini_options]
addopts = "--cov=src.trading.paper_account --cov-report=term-missing --cov-fail-under=80"
testpaths = ["tests"]

[tool.coverage.run]
branch = true

[tool.coverage.report]
show_missing = true
skip_covered = false
